<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 For Fouzia 💖</title>
    <!-- Using a very readable, elegant serif and sans-serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        /* ── Canvas for stars ── */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Heart scaling wrapper for mobile ── */
        #heartWrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center;
            transition: transform 0.2s ease-out;
            z-index: 2;
        }

        /* ── Heart container ── */
        .heart-container {
            position: relative;
            animation: rotate3d 20s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes rotate3d {
            0%, 100% { transform: rotateY(-12deg) rotateX(5deg); }
            50%      { transform: rotateY(12deg) rotateX(-5deg); }
        }

        #ui {
            position: relative;
            width: 520px;
            height: 520px;
            transform-style: preserve-3d;
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(234,128,176,0.1)); }
            15%      { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(234,128,176,0.3)); }
            30%      { transform: scale(1); filter: drop-shadow(0 0 10px rgba(234,128,176,0.1)); }
            45%      { transform: scale(1.03); filter: drop-shadow(0 0 15px rgba(234,128,176,0.2)); }
            60%      { transform: scale(1); filter: drop-shadow(0 0 10px rgba(234,128,176,0.1)); }
        }

        /* ── Love words ── */
        .love_word {
            position: absolute;
            color: #ffb8d2; /* Softer, lighter pink for high readability */
            font-size: 1.1rem;
            font-weight: 600;
            transform: translateY(-50%) rotateZ(var(--rot, -30deg));
            /* Reduced blur for crisp, readable text */
            text-shadow:
                0 0 5px rgba(255, 100, 160, 0.8),
                0 0 15px rgba(255, 100, 160, 0.4);
            letter-spacing: 1px;
            white-space: nowrap;
            will-change: transform;
        }

        .love_horizontal {
            animation: sway var(--dur, 8s) infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -280ms);
        }

        @keyframes sway {
            0%   { transform: translateX(-8px) translateY(-50%) rotateZ(var(--rot, -30deg)); }
            100% { transform: translateX(8px) translateY(-50%) rotateZ(var(--rot, -30deg));  }
        }

        /* ── Floating particles ── */
        .particle {
            position: fixed;
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0%   { opacity: 0; transform: translateY(100vh) scale(0); }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.2; }
            100% { opacity: 0; transform: translateY(-15vh) scale(1.2); }
        }

        /* ── Heart-shaped particle burst ── */
        .heart-particle {
            position: fixed;
            font-size: 1.5rem;
            opacity: 0;
            z-index: 101;
            pointer-events: none;
            animation: heart-float 4s ease-out forwards;
        }

        @keyframes heart-float {
            0%   { opacity: 1; transform: translateY(0) scale(0.5) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-300px) scale(1.5) rotate(30deg); }
        }

        /* ══════════════════════════════════════
           ──  FOUZIA POPUP OVERLAY  ──
           ══════════════════════════════════════ */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 8, 0.9); /* Darker backdrop for contrast */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .popup-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .popup-card {
            position: relative;
            text-align: center;
            width: 90%;
            max-width: 400px; /* Optimized for mobile width */
            padding: 40px 20px;
            border-radius: 20px;
            background: #120a10; /* Solid dark background for text readability */
            border: 2px solid #ea80b0;
            box-shadow: 0 0 30px rgba(234, 128, 176, 0.4);
            transform: scale(0.8) translateY(20px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .popup-overlay.show .popup-card {
            transform: scale(1) translateY(0);
        }

        .popup-hearts {
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: popupPulse 2s ease-in-out infinite;
        }

        @keyframes popupPulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.1); }
        }

        .popup-name {
            /* Fallback safe fonts, solid color (removed text-fill-color for browser safety) */
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 600;
            font-style: italic;
            color: #ff85b6; /* Bright visible pink */
            text-shadow: 0 0 15px rgba(255, 133, 182, 0.6);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .popup-subtitle {
            font-size: 1rem;
            color: #ffc4d9;
            margin-top: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .popup-message {
            font-size: 1.05rem;
            color: #ffdce8;
            margin-top: 20px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .popup-btn {
            margin-top: 30px;
            padding: 15px 40px;
            border: none;
            background: #ea80b0;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(234, 128, 176, 0.4);
            text-transform: uppercase;
        }

        .popup-btn:hover, .popup-btn:active {
            background: #ff98c3;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(234, 128, 176, 0.6);
        }

        /* Sparkle decorations on popup */
        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #ff85b6;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50%      { opacity: 1; transform: scale(1.5); }
        }
    </style>
</head>
<body>

    <!-- Starfield canvas -->
    <canvas id="starfield"></canvas>

    <!-- Floating particles -->
    <div id="particles"></div>

    <!-- Responsive wrapper for heart to scale on mobile -->
    <div id="heartWrapper">
        <div class="heart-container">
            <div id="ui"></div>
        </div>
    </div>

    <!-- ── Fouzia Popup ── -->
    <div class="popup-overlay" id="popup">
        <div class="popup-card" id="popupCard">
            <div class="popup-hearts">💖✨💖</div>
            <!-- Using solid color to fix invisible text bug on some mobile browsers -->
            <div class="popup-name">Fouzia</div>
            <div class="popup-subtitle">You are my everything</div>
            <div class="popup-message">
                Every beat of my heart whispers your name.<br>
                This is for you. 💕
            </div>
            <button class="popup-btn" id="popupBtn">See Your Heart</button>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════
        //   MOBILE SCALE LOGIC
        // ══════════════════════════════════════
        function updateScale() {
            const wrapper = document.getElementById('heartWrapper');
            const winWidth = window.innerWidth;
            // Base width is 550. If screen is smaller, scale it down proportionally.
            let scale = 1;
            if (winWidth < 550) {
                scale = (winWidth / 550) * 0.95; // 0.95 adds a little padding margin
            }
            wrapper.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', updateScale);
        updateScale(); // Initial call

        // ══════════════════════════════════════
        //   POPUP LOGIC
        // ══════════════════════════════════════
        const popup = document.getElementById('popup');
        const popupBtn = document.getElementById('popupBtn');
        const popupCard = document.getElementById('popupCard');

        // Add sparkles to popup card
        for (let i = 0; i < 8; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.top = (10 + Math.random() * 80) + '%';
            sparkle.style.left = (10 + Math.random() * 80) + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            popupCard.appendChild(sparkle);
        }

        // Show popup on load
        setTimeout(() => popup.classList.add('show'), 300);

        popupBtn.addEventListener('click', () => {
            popup.classList.remove('show');
            // Burst heart emojis
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-particle';
                    heart.textContent = ['💖','💕','💗','❤️','💘','✨'][Math.floor(Math.random() * 6)];
                    heart.style.left = (20 + Math.random() * 60) + 'vw';
                    heart.style.top = (40 + Math.random() * 20) + 'vh';
                    heart.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }, i * 50);
            }
        });

        // ══════════════════════════════════════
        //   STARFIELD BACKGROUND
        // ══════════════════════════════════════
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createStars(Math.floor(window.innerWidth / 5)); // Adjust stars by screen width
        }

        function createStars(count) {
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    da: (Math.random() - 0.5) * 0.02,
                    color: Math.random() > 0.6 ? `234,128,176` : `255,255,255`
                });
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.alpha += s.da;
                if (s.alpha <= 0.1 || s.alpha >= 1) s.da *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${s.color}, ${Math.max(0.05, s.alpha).toFixed(2)})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ══════════════════════════════════════
        //   HEART GENERATION
        // ══════════════════════════════════════
        const ui = document.getElementById('ui');
        // Reduced variations to make the design cleaner and highly readable
        const phrases = ['I Love You', 'Fouzia', 'I love you', 'Fouzia ♡'];

        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); }

        function createWord(x, y, angle, index, phrase, size, duration) {
            const span = document.createElement('span');
            span.className = 'love_word love_horizontal';
            span.textContent = phrase;
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            span.style.setProperty('--i', index);
            span.style.setProperty('--rot', angle + 'deg');
            span.style.setProperty('--dur', duration + 's');
            span.style.fontSize = size + 'rem';
            ui.appendChild(span);
        }

        const centerX = 260, centerY = 240;

        // Optimized layers for readability (fewer overlapping words)
        const layers = [
            { scale: 14, count: 70, size: 1.15 }, // Outer main ring
            { scale: 11, count: 50, size: 1.05 }, // Mid ring
            { scale: 8,  count: 35, size: 0.95 },  // Inner ring
            { scale: 5,  count: 20, size: 0.85 },  // Core
            { scale: 2.5, count: 8, size: 0.80 }   // Center
        ];

        let globalIdx = 0;
        layers.forEach((layer, layerIndex) => {
            for (let i = 0; i < layer.count; i++) {
                const t = (i / layer.count) * 2 * Math.PI;
                const x = heartX(t) * layer.scale + centerX;
                const y = heartY(t) * layer.scale + centerY;
                
                // Calculate curve tangent for rotation
                const dt = 0.01;
                const angle = Math.atan2(heartY(t+dt)-heartY(t), heartX(t+dt)-heartX(t)) * (180/Math.PI);
                
                // Choose text (prioritize 'Fouzia' and 'I Love You')
                const phrase = phrases[Math.floor(Math.random() * phrases.length)];
                
                // Slightly randomize size and animation duration for organic feel
                const finalSize = layer.size * (0.9 + Math.random() * 0.2);
                const duration = 6 + Math.random() * 4;

                createWord(x, y, angle, globalIdx++, phrase, finalSize, duration);
            }
        });

        // ══════════════════════════════════════
        //   FLOATING PARTICLES
        // ══════════════════════════════════════
        const particlesContainer = document.getElementById('particles');
        const particleCount = Math.floor(window.innerWidth / 15); // Scale amount for mobile
        for (let i = 0; i < Math.min(particleCount, 30); i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (8 + Math.random() * 10) + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            const size = (3 + Math.random() * 3) + 'px';
            p.style.width = size;
            p.style.height = size;
            
            p.style.background = Math.random() > 0.5 
                ? `rgba(234,128,176,${0.6 + Math.random()*0.4})` 
                : `rgba(255,255,255,${0.5 + Math.random()*0.3})`;
            p.style.boxShadow = `0 0 ${5 + Math.random()*5}px ${p.style.background}`;
            particlesContainer.appendChild(p);
        }
    </script>
</body>
</html>
